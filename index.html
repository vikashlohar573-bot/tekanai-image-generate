<!DOCTYPE html>
<html>
<head>
  <title>Tankgan AI Image Generator</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      width: 300px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Tankgan AI Image Generator</h1>

  <input type="text" id="prompt" placeholder="Enter your idea">
  <button onclick="generate()">Generate</button>

  <p id="loading"></p>

  <img id="image">
  <br>
  <a id="download" download="ai-image.png">
    <button>Download Image</button>
  </a>

  <script src="script.js"></script>

</body>
</html>
