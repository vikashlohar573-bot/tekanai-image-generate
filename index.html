<!DOCTYPE html>
<html>
<head>
  <title>TekanAI</title>
</head>

<body style="text-align:center; font-family:Arial; background:#0f172a; color:white;">

<h1>🚀 TekanAI Image Generator</h1>

<input id="prompt" placeholder="Enter prompt" style="padding:10px; width:250px;">
<button onclick="generate()" style="padding:10px; background:green; color:white;">Generate</button>

<p id="loading"></p>

<img id="image" width="300">

<br><br>
<button onclick="downloadImage()" style="padding:10px;">Download</button>

<script>
function generate() {
  let prompt = document.getElementById("prompt").value;

  if (!prompt) {
    alert("कुछ लिखो पहले!");
    return;
  }

  document.getElementById("loading").innerText = "Image बन रही है...";

  // cache avoid करने के लिए random जोड़ रहे हैं
  let url = "https://image.pollinations.ai/prompt/" 
            + encodeURIComponent(prompt) 
            + "?t=" + new Date().getTime();

  let img = document.getElementById("image");
  img.src = url;

  document.getElementById("loading").innerText = "";
}

// download fix
function downloadImage() {
  let img = document.getElementById("image").src;

  if (!img) {
    alert("पहले image बनाओ!");
    return;
  }

  let a = document.createElement("a");
  a.href = img;
  a.download = "ai-image.png";
  a.click();
}
</script>

</body>
</html>
